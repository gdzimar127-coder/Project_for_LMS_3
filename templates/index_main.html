<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажёр ОГЭ</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; }

        header {
            background: #2c3e50; color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .title { font-size: 22px; font-weight: 600; }
        .profile-btn, .logout-btn {
            background: white; border: 2px solid black; color: black;
            padding: 8px 18px; cursor: pointer; border-radius: 6px;
            font-size: 14px; font-weight: 500; transition: 0.2s;
        }
        .profile-btn:hover { background: #e9ecef; }
        .logout-btn { border-color: white; color: white; background: transparent; }
        .logout-btn:hover { background: rgba(255,255,255,0.15); }
        .user-info { display: flex; align-items: center; gap: 12px; }

        .flash {
            background: #fff3cd; color: #856404; padding: 12px;
            margin: 20px auto 0; max-width: 420px; border-radius: 6px;
            text-align: center; border: 1px solid #ffeeba;
        }
        .main-actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 120px);
            gap: 20px;
            padding: 20px;
        }
        .action-btn {
            display: inline-block;
            background: #2c3e50;
            color: white;
            padding: 14px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            width: 260px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            transition: background 0.2s, transform 0.1s;
        }
        .action-btn:hover {
            background: #34495e;
            transform: translateY(-2px);
        }
        .action-btn:active {
            transform: translateY(0);
        }
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 24px; border-radius: 10px;
            width: 340px; position: relative; box-shadow: 0 6px 16px rgba(0,0,0,0.2);
        }
        .close { position: absolute; top: 10px; right: 14px; cursor: pointer; font-size: 24px; color: #666; }

        .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        .tab {
            flex: 1; padding: 12px; text-align: center; cursor: pointer;
            color: #777; font-weight: 500; transition: 0.2s; background: none; border: none;
        }
        .tab.active { color: #2c3e50; border-bottom: 2px solid #2c3e50; }

        .form-view { display: none; }
        .form-view.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input {
            width: 100%; padding: 10px; margin: 8px 0 14px;
            border: 1px solid #ccc; border-radius: 6px; font-size: 14px;
        }
        button[type="submit"] {
            width: 100%; padding: 10px; background: #2c3e50; color: white;
            border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500;
        }
        button[type="submit"]:hover { background: #34495e; }
    </style>
</head>
<body>
    <header>
        <div class="title">Тренажёр ОГЭ</div>
        {% if username %}
            <div class="user-info">
                <span>👤 {{ username }}</span>
                <a href="{{ url_for('logout') }}"><button class="logout-btn">Выйти</button></a>
            </div>
        {% else %}
            <button class="profile-btn" id="openModal">Профиль</button>
        {% endif %}
    </header>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="flash">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <main class="main-actions">
        <a href="/info" class="action-btn">Справка ГИА</a>
        <a href="/training" class="action-btn">Перейти к тренировке</a>
    </main>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <div class="tabs">
                <button class="tab active" data-view="login">Вход</button>
                <button class="tab" data-view="register">Регистрация</button>
            </div>

            <div id="login-view" class="form-view active">
                <form action="{{ url_for('login') }}" method="POST">
                    <input type="text" name="username" placeholder="Логин" required autocomplete="username">
                    <input type="password" name="password" placeholder="Пароль" required autocomplete="current-password">
                    <button type="submit">Войти</button>
                </form>
            </div>

            <div id="register-view" class="form-view">
                <form action="{{ url_for('register') }}" method="POST">
                    <input type="text" name="username" placeholder="Придумайте логин" required autocomplete="username">
                    <input type="password" name="password" placeholder="Придумайте пароль" required autocomplete="new-password">
                    <button type="submit">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('authModal');
        document.getElementById('openModal').onclick = () => modal.style.display = 'flex';
        document.getElementById('closeModal').onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.form-view').forEach(v => v.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.view + '-view').classList.add('active');
            });
        });
    </script>
</body>
</html>
