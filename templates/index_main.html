<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Empty</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .profile-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: white;
            border: 2px solid black;
            color: black;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .profile-btn:hover {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <button class="profile-btn">Профиль</button>
</body>
</html>
