<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f8; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #2c3e50; color: white; }
        .btn { padding: 10px 20px; background: #2c3e50; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>👤 Кабинет: {{ username }}</h2>
        <a href="/" class="btn">← На главную</a>
        <h3>История попыток</h3>
        <table id="historyTable">
            <thead><tr><th>Предмет</th><th>Результат</th><th>Дата</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <script>
        fetch('/api/profile/stats').then(r => r.json()).then(data => {
            const tbody = document.querySelector('#historyTable tbody');
            data.history.forEach(h => {
                tbody.innerHTML += `<tr><td>${h.subject}</td><td><b>${h.score}%</b></td><td>${new Date(h.date).toLocaleDateString()}</td></tr>`;
            });
        });
    </script>
</body>
</html>
