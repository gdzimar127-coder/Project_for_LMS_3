<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестирование | Тренажёр ОГЭ</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .timer { font-size: 1.5rem; font-weight: bold; color: #ef4444; text-align: right; }
        .question { font-size: 1.2rem; margin-bottom: 15px; }
        .options label { display: block; padding: 10px; margin: 5px 0; background: #f8fafc; border-radius: 6px; cursor: pointer; }
        .options input { margin-right: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-secondary { background: #64748b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        #question-area, #result-area { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>📝 Настройки тестирования</h2>
            <div id="settings-area">
                <label>Предмет:
                    <select id="subject-select">
                        {% for s in subjects %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
                    </select>
                </label>
                <label>Количество вопросов:
                    <select id="count-select"><option value="5">5</option><option value="10">10</option><option value="20">20</option></select>
                </label>
                <br><br>
                <button class="btn btn-primary" onclick="startTest()">Начать тест</button>
                <a href="/subjects" class="btn btn-secondary">← Назад</a>
            </div>
        </div>

        <div class="card" id="question-area">
            <div class="timer" id="timer">00:00</div>
            <div id="progress" style="color:#64748b; margin-bottom:10px;"></div>
            <div id="question-container"></div>
            <div class="options" id="options-container"></div>
            <div style="margin-top:20px;">
                <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()">Далее →</button>
                <button class="btn btn-danger" onclick="finishTest()">Завершить досрочно</button>
            </div>
        </div>

        <div class="card" id="result-area" style="text-align:center;">
            <h2>🎉 Результаты</h2>
            <div id="score-display" style="font-size:2rem; font-weight:bold; margin:10px 0;">0%</div>
            <p id="result-text"></p>
            <button class="btn btn-primary" onclick="location.reload()">Новый тест</button>
            <a href="/profile" class="btn btn-secondary">Моя статистика</a>
        </div>
    </div>
    <script>
        let attemptId = null, questions = [], current = 0, correct = 0, time = 0, timerInterval;
        function startTest() {
            const sub = document.getElementById('subject-select').value;
            const count = document.getElementById('count-select').value;
            fetch('/api/start_test', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({subject_id:sub})})
            .then(r=>r.json()).then(d => {
                attemptId = d.attempt_id;
                fetch(`/api/tasks?subject_id=${sub}&limit=${count}`).then(r=>r.json()).then(data => {
                    questions = data;
                    document.getElementById('settings-area').style.display='none';
                    document.getElementById('question-area').style.display='block';
                    startTimer();
                    showQuestion();
                });
            });
        }
        function startTimer() { timerInterval = setInterval(()=>{ time++; let m=Math.floor(time/60).toString().padStart(2,'0'), s=(time%60).toString().padStart(2,'0'); document.getElementById('timer').textContent=`${m}:${s}`; }, 1000); }
        function showQuestion() {
            if(current >= questions.length) return finishTest();
            let q = questions[current];
            document.getElementById('progress').textContent = `Вопрос ${current+1} из ${questions.length}`;
            document.getElementById('question-container').innerHTML = `<div class="question">${q.question_text}</div>`;
            let opts = document.getElementById('options-container');
            opts.innerHTML = '';
            JSON.parse(q.options_json).forEach(opt => {
                opts.innerHTML += `<label><input type="radio" name="opt" value="${opt}"> ${opt}</label>`;
            });
        }
        function nextQuestion() {
            let sel = document.querySelector('input[name="opt"]:checked');
            if(!sel) return alert('Выберите ответ!');
            fetch('/api/submit_answer', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({attempt_id:attemptId, task_id:questions[current].id, answer:sel.value})})
            .then(r=>r.json()).then(d => {
                if(d.correct) correct++;
                current++;
                showQuestion();
            });
        }
        function finishTest() {
            clearInterval(timerInterval);
            fetch('/api/finish_test', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({attempt_id:attemptId, time_spent:time})})
            .then(r=>r.json()).then(d => {
                document.getElementById('question-area').style.display='none';
                document.getElementById('result-area').style.display='block';
                document.getElementById('score-display').textContent = d.percentage;
                document.getElementById('result-text').textContent = `Правильных ответов: ${d.correct} из ${d.total}`;
            });
        }
    </script>
</body>
</html>
