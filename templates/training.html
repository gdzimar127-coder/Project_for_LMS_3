<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестирование | Тренажёр ОГЭ</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .timer { font-size: 1.5rem; font-weight: bold; color: #ef4444; text-align: right; }
        .question { font-size: 1.2rem; margin-bottom: 15px; }
        .options label { display: block; padding: 10px; margin: 5px 0; background: #f8fafc; border-radius: 6px; cursor: pointer; }
        .options input { margin-right: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #64748b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #question-area, #result-area { display: none; }
    </style>
</head>
<body>
    <div id="loading-overlay" style="display:none;">
        <div class="spinner"></div>
        <h3>⏳ Нейросеть генерирует примеры...</h3>
        <p style="color:#64748b">Пожалуйста, подождите, подготовка заданий к ОГЭ займёт 5-10 секунд</p>
    </div>

    <div class="container">
        <div class="card" id="settings-area">
            <h2>📝 Настройки тестирования</h2>
            <label>Предмет:
                <select id="subject-select">
                    {% for s in subjects %}<option value="{{ s.name }}">{{ s.name }}</option>{% endfor %}
                </select>
            </label>
            <label>Тема:
                <input type="text" id="topic-input" placeholder="Например: Уравнения" value="{{ request.args.get('topic', '') }}">
            </label>
            <label>Количество вопросов:
                <select id="count-select"><option value="5">5</option><option value="10">10</option><option value="15">15</option></select>
            </label>
            <br><br>
            <button class="btn btn-primary" onclick="startTest()">Начать тест</button>
            <a href="/subjects" class="btn btn-secondary">← Назад</a>
        </div>

        <div class="card" id="question-area">
            <div class="timer" id="timer">00:00</div>
            <div id="progress" style="color:#64748b; margin-bottom:10px;"></div>
            <div id="question-container"></div>
            <div class="options" id="options-container"></div>
            <div style="margin-top:20px;">
                <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()">Далее →</button>
                <button class="btn btn-danger" onclick="finishTest()">Завершить досрочно</button>
            </div>
        </div>

        <div class="card" id="result-area" style="text-align:center;">
            <h2>🎉 Результаты</h2>
            <div id="score-display" style="font-size:2rem; font-weight:bold; margin:10px 0;">0%</div>
            <p id="result-text"></p>
            <button class="btn btn-primary" onclick="location.reload()">Новый тест</button>
            <a href="/profile" class="btn btn-secondary">Моя статистика</a>
        </div>
    </div>
    <script>
        let questions = [], current = 0, correct = 0, time = 0, timerInterval;
        function startTest() {
            const subject = document.getElementById('subject-select').value;
            const topic = document.getElementById('topic-input').value || 'Общие темы';
            const count = document.getElementById('count-select').value;
            const loader = document.getElementById('loading-overlay');
            loader.style.display = 'flex';

            fetch('/api/generate_questions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({subject, topic, count})
            })
            .then(r => r.json())
            .then(data => {
                loader.style.display = 'none';
                if(data.error) throw new Error(data.error);
                questions = data;
                current = 0; correct = 0;
                document.getElementById('settings-area').style.display='none';
                document.getElementById('question-area').style.display='block';
                startTimer();
                showQuestion();
            })
            .catch(err => {
                loader.style.display = 'none';
                alert('Ошибка генерации: ' + err.message);
            });
        }
        function startTimer() { timerInterval = setInterval(()=>{ time++; let m=Math.floor(time/60).toString().padStart(2,'0'), s=(time%60).toString().padStart(2,'0'); document.getElementById('timer').textContent=`${m}:${s}`; }, 1000); }
        function showQuestion() {
            if(current >= questions.length) return finishTest();
            let q = questions[current];
            document.getElementById('progress').textContent = `Вопрос ${current+1} из ${questions.length}`;
            document.getElementById('question-container').innerHTML = `<div class="question">${q.question}</div>`;
            let opts = document.getElementById('options-container');
            opts.innerHTML = '';
            q.options.forEach(opt => {
                opts.innerHTML += `<label><input type="radio" name="opt" value="${opt}"> ${opt}</label>`;
            });
        }
        function nextQuestion() {
            let sel = document.querySelector('input[name="opt"]:checked');
            if(!sel) return alert('Выберите ответ!');
            if(sel.value === questions[current].correct_answer) correct++;
            current++;
            showQuestion();
        }
        function finishTest() {
            clearInterval(timerInterval);
            document.getElementById('question-area').style.display='none';
            document.getElementById('result-area').style.display='block';
            let score = questions.length > 0 ? Math.round((correct / questions.length) * 100) : 0;
            document.getElementById('score-display').textContent = score + '%';
            document.getElementById('result-text').textContent = `Правильных ответов: ${correct} из ${questions.length}`;
        }
    </script>
</body>
</html>
