<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренировка с Алисой | Тренажёр ОГЭ</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; }
        header {
            background: #2c3e50; color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .title { font-size: 22px; font-weight: 600; }
        .profile-btn, .logout-btn {
            background: white; border: 2px solid black; color: black;
            padding: 8px 18px; cursor: pointer; border-radius: 6px;
            font-size: 14px; font-weight: 500; transition: 0.2s;
        }
        .profile-btn:hover { background: #e9ecef; }
        .logout-btn { border-color: white; color: white; background: transparent; }
        .logout-btn:hover { background: rgba(255,255,255,0.15); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .chat-container {
            max-width: 700px; margin: 30px auto; background: white;
            border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; height: calc(100vh - 100px);
        }
        .chat-header {
            padding: 15px 20px; border-bottom: 1px solid #eee;
            display: flex; align-items: center; gap: 12px; background: #f8f9fa;
            border-radius: 12px 12px 0 0;
        }
        .alisa-avatar {
            width: 40px; height: 40px; background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 18px;
        }
        .alisa-name { font-weight: 600; color: #2c3e50; }
        .alisa-status { font-size: 12px; color: #27ae60; }
        .chat-messages {
            flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
        }
        .message {
            max-width: 80%; padding: 12px 16px; border-radius: 18px;
            font-size: 14px; line-height: 1.4; animation: slideIn 0.2s;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.alisa { align-self: flex-start; background: #f1f3f5; color: #2c3e50; border-bottom-left-radius: 4px; }
        .message.user { align-self: flex-end; background: #2c3e50; color: white; border-bottom-right-radius: 4px; }
        .choice-buttons {
            display: flex; flex-wrap: wrap; gap: 10px; padding: 15px 20px;
            border-top: 1px solid #eee; background: #f8f9fa; border-radius: 0 0 12px 12px;
        }
        .choice-btn {
            padding: 10px 18px; background: white; border: 2px solid #2c3e50;
            color: #2c3e50; border-radius: 25px; cursor: pointer;
            font-size: 14px; font-weight: 500; transition: 0.2s;
        }
        .choice-btn:hover { background: #2c3e50; color: white; }
        .choice-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .back-btn {
            display: inline-block; margin: 20px auto; padding: 12px 24px;
            background: #2c3e50; color: white; text-decoration: none;
            border-radius: 6px; font-weight: 500; transition: 0.2s; width: fit-content;
        }
        .back-btn:hover { background: #34495e; }
        @media (max-width: 600px) {
            .chat-container { height: calc(100vh - 80px); margin: 15px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="title">Тренажёр ОГЭ</div>
        {% if username %}
            <div class="user-info">
                <span>👤 {{ username }}</span>
                <a href="{{ url_for('logout') }}"><button class="logout-btn">Выйти</button></a>
            </div>
        {% else %}
            <button class="profile-btn" onclick="window.location.href='/'">Профиль</button>
        {% endif %}
    </header>
    <main class="chat-container">
        <div class="chat-header">
            <div class="alisa-avatar">А</div>
            <div>
                <div class="alisa-name">Алиса</div>
                <div class="alisa-status">● онлайн</div>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message alisa">Привет! Я Алиса — ваш помощник для подготовки к экзаменам. 🎓</div>
            <div class="message alisa">Что вы сдаете: ОГЭ или ЕГЭ?</div>
        </div>
        <div class="choice-buttons" id="choiceButtons">
            <button class="choice-btn" onclick="selectOption('ОГЭ')">ОГЭ</button>
            <button class="choice-btn" onclick="selectOption('ЕГЭ')">ЕГЭ</button>
        </div>
    </main>
    <a href="/" class="back-btn">← Вернуться на главную</a>
    <script>
        const chatMessages = document.getElementById('chatMessages');
        const choiceButtons = document.getElementById('choiceButtons');
        function selectOption(text) {
            const msg = document.createElement('div');
            msg.className = 'message user';
            msg.textContent = text;
            chatMessages.appendChild(msg);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
            setTimeout(() => {
                const reply = document.createElement('div');
                reply.className = 'message alisa';
                reply.textContent = `Отлично, ${text}! Выбор предмета скоро будет доступен.`;
                chatMessages.appendChild(reply);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
