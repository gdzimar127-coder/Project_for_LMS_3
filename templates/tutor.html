<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Репетитор: {{ subject or 'Общий вопрос' }}</title>
    <style>
        :root { --primary: #667eea; --bg: #f5f7fa; --card: #ffffff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .chat-box { width: 100%; max-width: 850px; height: 90vh; background: var(--card); border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .header { background: linear-gradient(135deg, var(--primary), #764ba2); color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-info h3 { margin: 0 0 4px; font-size: 1.1rem; }
        .header-info p { margin: 0; opacity: 0.9; font-size: 0.9rem; }
        .header a { color: white; text-decoration: none; background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 8px; font-size: 0.9rem; transition: 0.2s; }
        .header a:hover { background: rgba(255,255,255,0.3); }
        .topic-tag { display: inline-block; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; margin-top: 8px; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #fafbfc; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; white-space: pre-wrap; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { background: #dbeafe; color: #1e40af; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: var(--card); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-area { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--card); }
        input { flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        button { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        button:hover { background: #5568d8; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .typing { color: var(--muted); font-style: italic; padding: 8px 16px; }
    </style>
</head>
<body>
    <div class="chat-box">
        <div class="header">
            <div class="header-info">
                <h3>👨‍🏫 Репетитор ОГЭ/ЕГЭ</h3>
                <p>Онлайн • Готов помочь с любым вопросом</p>
                {% if not is_general %}
                    <span class="topic-tag">📚 {{ subject }}: {{ topic }}</span>
                {% endif %}
            </div>
            <a href="javascript:history.back()">← Назад</a>
        </div>
        <div class="messages" id="msgs"></div>
        <div class="input-area">
            <input id="inp" placeholder="Задайте вопрос по теме..." onkeydown="if(event.key==='Enter')send()" autocomplete="off">
            <button id="sendBtn" onclick="send()">Отправить</button>
        </div>
    </div>

    <script>
        const subject = {{ subject | tojson }};
        const topic = {{ topic | tojson }};
        const username = {{ username | tojson }};
        const isGeneral = {{ is_general | tojson }};

        const msgs = document.getElementById('msgs');
        const inp = document.getElementById('inp');
        const sendBtn = document.getElementById('sendBtn');

        window.onload = () => {
            let welcomeText;
            if (isGeneral) {
                welcomeText = `Здравствуйте ${username}, я ваш репетитор для подготовки к ОГЭ/ЕГЭ, давайте разберем непонятную тему. С чего начнём?`;
            } else {
                welcomeText = `Здравствуйте, ${username}! Давайте разберём тему «${topic}» по предмету «${subject}». С чего начнём?`;
            }
            addMsg(welcomeText, 'ai');
        };

        async function send() {
            const txt = inp.value.trim();
            if (!txt) return;

            addMsg(txt, 'user');
            inp.value = '';
            inp.disabled = true;
            sendBtn.disabled = true;

            const typing = document.createElement('div');
            typing.className = 'msg ai typing';
            typing.textContent = '🤖 Думаю...';
            typing.id = 'typing-indicator';
            msgs.appendChild(typing);
            msgs.scrollTop = msgs.scrollHeight;

            try {
                const res = await fetch('/tutor_api', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: txt, subject, topic})
                });
                const data = await res.json();
                document.getElementById('typing-indicator')?.remove();

                if (data.error) addMsg('❌ ' + data.error, 'ai');
                else addMsg(data.response, 'ai');
            } catch (e) {
                document.getElementById('typing-indicator')?.remove();
                addMsg('⚠️ Ошибка соединения. Проверьте интернет.', 'ai');
            }
            inp.disabled = false;
            sendBtn.disabled = false;
            inp.focus();
        }

        function addMsg(txt, cls) {
            const d = document.createElement('div');
            d.className = 'msg ' + cls;
            d.textContent = txt;
            msgs.appendChild(d);
            msgs.scrollTop = msgs.scrollHeight;
        }
    </script>
</body>
</html>
